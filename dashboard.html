<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Windsor Grove Hub</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <div class="loader-wrapper" id="loader">
    <div class="loader">
      <div class="loader-ring"></div>
      <div class="loader-text">WINDSOR GROVE</div>
    </div>
  </div>
  <div class="bg-wrap">
    <div class="bg-gradient"></div>
    <div class="grid-overlay"></div>
  </div>

  <header id="header">
    <div class="container head-inner">
      <div class="brand" id="brand" style="cursor:pointer">
        <div class="logo" style="width:40px; height:40px; border-radius:50%; overflow:hidden; background:var(--bg); border:1px solid var(--border)">
          <img src="logo.png" alt="Windsor Grove" style="width:100%; height:100%; object-fit:cover">
        </div>
        <div>
          <div class="brand-title">WINDSOR GROVE</div>
          <div class="brand-sub">Expert Hotel Intelligence</div>
        </div>
      </div>
      <nav class="desktop-nav"></nav>
      <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap; justify-content:flex-end; max-width:100%">
        <button class="btn btn-outline" id="btn-login"
          style="padding: 10px 18px; flex:1 1 auto; white-space:nowrap; text-align:center; min-width:80px">Login</button>
        <button class="btn btn-primary" id="btn-create"
          style="padding: 10px 18px; flex:1 1 auto; white-space:nowrap; text-align:center; min-width:140px">Join Expert
          Circle</button>
        <button class="nav-btn" onclick="window.location.href='how-it-works.html'"
          style="padding: 10px 18px; flex:1 1 auto; white-space:nowrap; text-align:center; min-width:110px">How it
          Works</button>
      </div>
    </div>
  </header>

  <main>
    <div class="container" style="padding: 60px 0">
      <div class="dash-header"
        style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:60px;flex-wrap:wrap;gap:20px">
        <div style="min-width: 240px; max-width: 100%">
          <div class="eyebrow">Intellectual Gathering</div>
          <h2 style="font-size:clamp(1.8rem, 5vw, 2.8rem);margin-top:10px;word-break:break-word">Intelligence <span
              class="grad-text">Dashboard</span></h2>
          <p class="muted" id="stats-text">Monitoring premium properties worldwide</p>
        </div>
        <div class="dash-search-bar"
          style="display:flex;flex-wrap:wrap;align-items:center;gap:12px;background:#fff;padding:8px 14px;border-radius:18px;border:1px solid var(--border);max-width:100%;box-sizing:border-box">
          <input type="text" id="search-input" class="input"
            style="flex:1;min-width:130px;border:none;background:transparent;padding:4px 0"
            placeholder="Property or City...">
          <div class="search-divider" style="width:1px;height:24px;background:var(--border);"></div>
          <select id="country-select" class="select"
            style="flex:1;min-width:120px;max-width:100%;border:none;background:transparent;font-weight:600;padding:4px 0;text-overflow:ellipsis">
            <option value="All">All Regions</option>
          </select>
        </div>
      </div>

      <div class="hotel-grid" id="hotel-grid">
        <!-- Rendered via JS -->
      </div>
    </div>
  </main>

  <div class="mobile-tab-bar">
    <a href="dashboard.html" class="tab-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"></rect>
        <rect x="14" y="3" width="7" height="7"></rect>
        <rect x="14" y="14" width="7" height="7"></rect>
        <rect x="3" y="14" width="7" height="7"></rect>
      </svg>
      <span>Home</span>
    </a>
    <a href="tasks.html" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
        <polyline points="22 4 12 14.01 9 11.01"></polyline>
      </svg>
      <span>Missions</span>
    </a>
    <a href="account.html" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <line x1="12" y1="1" x2="12" y2="23"></line>
        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
      </svg>
      <span>Ledger</span>
    </a>
    <a href="support.html" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
      <span>Support</span>
    </a>
  </div>

  <footer>
    <div class="container foot-inner"></div>
  </footer>

  <div class="toasts" id="toasts"></div>

  <script src="assets/js/core.js"></script>
  <script>
    const grid = document.getElementById("hotel-grid");
    const stats = document.getElementById("stats-text");
    const sInput = document.getElementById("search-input");
    const cSelect = document.getElementById("country-select");

    // Initialize filters from URL
    const params = new URLSearchParams(window.location.search);
    let currentSearch = params.get('loc') || params.get('city') || "";
    let currentRegion = params.get('region') || "All";

    sInput.value = currentSearch;

    async function initDashboard() {
      try {
        // Fetch all hotels to populate region filter dynamically
        const allRes = await fetch(`${API_URL}/hotels`);
        const allHotels = await allRes.json();
        const regions = ["All", ...new Set(allHotels.map(h => h.country))];

        // Only update if not already populated to avoid resetting the dropdown while typing
        if (cSelect.options.length <= 1) {
          cSelect.innerHTML = regions.map(r => `<option value="${r}" ${currentRegion === r ? 'selected' : ''}>${r}</option>`).join("");
        }
      } catch (e) {
        console.error(e);
      }
      await renderDashboard();
    }

    function rateHotel(hotelId) {
      window.location.href = `tasks.html?id=${hotelId}`;
    }

    async function renderDashboard() {
      const url = new URL(`${API_URL}/hotels`, window.location.origin);
      if (currentSearch) url.searchParams.set('search', currentSearch);
      if (currentRegion !== 'All') url.searchParams.set('country', currentRegion);

      try {
        const res = await fetch(url);
        const hotels = await res.json();

        stats.textContent = `Monitoring ${hotels.length} premium properties worldwide`;

        grid.innerHTML = hotels.map(h => `
              <div class="hotel">
                <div class="hotel-img">
                  <img src="${h.image.startsWith('http') ? h.image : 'assets/img/' + h.image}" alt="${h.name}">
                  <div class="hotel-badge">${h.category}</div>
                </div>
                <div class="hotel-body">
                  <div class="hotel-name">${h.name}</div>
                  <div class="hotel-meta">${h.city}, ${h.country}</div>
                  <div class="hotel-foot">
                    <div>
                      <div class="hotel-price">${fmt(h.price)} <span class="muted" style="font-size:12px;font-weight:400">/night</span></div>
                      <div class="hotel-earn">Earn ${fmt(h.commission_rate)}</div>
                    </div>
                    <button class="btn btn-primary" onclick="rateHotel('${h.id}')" style="padding: 10px 16px">Rate Expertly</button>
                  </div>
                </div>
              </div>
            `).join("");

        if (hotels.length === 0) {
          grid.innerHTML = `<div class="card card-pad muted" style="grid-column:1/-1;text-align:center;padding:100px">No properties found matching your intelligence parameters.</div>`;
        }
      } catch (e) {
        toast("Failed to connect to Windsor Grove API.");
      }
    }


    sInput.oninput = (e) => { currentSearch = e.target.value; renderDashboard(); };
    cSelect.onchange = (e) => { currentRegion = e.target.value; renderDashboard(); };

    initDashboard();
  </script>
</body>

</html>
